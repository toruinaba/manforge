[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "manforge"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "jax[cpu]>=0.4.20",
    "scipy",
]

[project.optional-dependencies]
dev = ["pytest"]
examples = ["matplotlib"]
fortran = ["meson>=1.10.2", "ninja>=1.13.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/manforge"]

[tool.pytest.ini_options]
testpaths = ["tests"]
